hostname spine-02
!
router ospf 1
  router-id 10.0.1.2
!
router bgp 65000
  router-id 10.0.1.2
  
  !
  
  neighbor 10.0.0.5 remote-as 65001
  
  neighbor 10.0.0.7 remote-as 65002
  
  neighbor 10.0.0.8 remote-as 65000
  
  !
  address-family ipv4 unicast
    
    neighbor 10.0.0.5 activate
    
    neighbor 10.0.0.7 activate
    
    neighbor 10.0.0.8 activate
    
  !
!

interface Ethernet1
  description "Link to leaf-01"
  ip address 10.0.0.4 255.255.255.254
  ip mtu 9000
  ip ospf area 0
!

interface Ethernet2
  description "Link to leaf-02"
  ip address 10.0.0.6 255.255.255.254
  ip mtu 9000
  ip ospf area 0
!

interface Ethernet3
  description "Link to spine-01"
  ip address 10.0.0.9 255.255.255.254
  ip mtu 9000
  ip ospf area 0
!

interface Loopback0
  ip address 10.0.1.2 255.255.255.255
!

vrf definition blue
  rd 65000:1
!

vrf definition red
  rd 65000:2
!
